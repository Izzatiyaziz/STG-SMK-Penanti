<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>STG OMR Test Sheet (10Q)</title>
    <style>
      @page {
        size: A4;
        margin: 10mm;
      }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto,
          Arial, "Noto Sans";
      }
      .wrap {
        display: grid;
        place-items: center;
        padding: 8mm;
      }
      .sheet {
        width: 190mm;
        height: 277mm;
        position: relative;
      }
      .hint {
        font-size: 12px;
        color: #333;
        margin: 0 0 8px;
      }
      .print {
        position: fixed;
        top: 10px;
        right: 10px;
        padding: 8px 10px;
        border: 1px solid #000;
        background: #fff;
        cursor: pointer;
      }
      @media print {
        .print {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <button class="print" onclick="window.print()">Print</button>
    <div class="wrap">
      <div class="sheet">
        <p class="hint">
          Print at 100% scale (no "Fit to page"). Thick border is required for
          auto corner detection.
        </p>
        <!-- Use an SVG with a fixed 1400x2000 viewBox so the template JSON matches. -->
        <svg
          viewBox="0 0 1400 2000"
          width="100%"
          height="calc(100% - 20px)"
          xmlns="http://www.w3.org/2000/svg"
        >
          <rect
            x="20"
            y="20"
            width="1360"
            height="1960"
            fill="none"
            stroke="#000"
            stroke-width="18"
          />

          <text x="70" y="120" font-size="48" font-weight="700">STG OMR TEST (10Q)</text>
          <text x="70" y="180" font-size="28">
            Name: ____________________________
          </text>
          <text x="70" y="230" font-size="28">
            Class: ___________________________
          </text>

          <text x="420" y="320" font-size="26" font-weight="700">A</text>
          <text x="650" y="320" font-size="26" font-weight="700">B</text>
          <text x="880" y="320" font-size="26" font-weight="700">C</text>
          <text x="1110" y="320" font-size="26" font-weight="700">D</text>

          <!-- Rows: y = 400 + i*140, bubbles at x=440/670/900/1130 -->
          <g fill="none" stroke="#000" stroke-width="4">
            <g id="row">
              <circle cx="440" cy="400" r="22" />
              <circle cx="670" cy="400" r="22" />
              <circle cx="900" cy="400" r="22" />
              <circle cx="1130" cy="400" r="22" />
            </g>
            <use href="#row" y="140" />
            <use href="#row" y="280" />
            <use href="#row" y="420" />
            <use href="#row" y="560" />
            <use href="#row" y="700" />
            <use href="#row" y="840" />
            <use href="#row" y="980" />
            <use href="#row" y="1120" />
            <use href="#row" y="1260" />
          </g>

          <g font-size="28" font-weight="700">
            <text x="200" y="410">1</text>
            <text x="200" y="550">2</text>
            <text x="200" y="690">3</text>
            <text x="200" y="830">4</text>
            <text x="200" y="970">5</text>
            <text x="200" y="1110">6</text>
            <text x="200" y="1250">7</text>
            <text x="200" y="1390">8</text>
            <text x="200" y="1530">9</text>
            <text x="200" y="1670">10</text>
          </g>

          <text x="70" y="1900" font-size="22" fill="#111">
            Tip: Use a bright area, hold camera flat, include full border in photo.
          </text>
        </svg>
      </div>
    </div>
  </body>
</html>
