# fly.toml app configuration file generated for stg-smk-penanti-omr-airy-pinecone-5015 on 2026-06-14T16:18:33+08:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'stg-smk-penanti-omr-airy-pinecone-5015'
primary_region = 'sin'

[build]
  dockerfile = 'Dockerfile.fly'

[env]
  OMR_DEBUG = '0'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 2
    soft_limit = 1

  [[http_service.checks]]
    interval = '30s'
    timeout = '10s'
    grace_period = '30s'
    method = 'GET'
    path = '/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '1gb'
